[build]
  builder = "nixpacks"
  [build.nixpacks.config]
    pythonVersion = "3.12"

[deploy]
  startCommand = "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn news_system.wsgi:application --bind 0.0.0.0:${PORT:-8080} --workers 2"
  healthcheckPath = "/"
  restartPolicyType = "always"
